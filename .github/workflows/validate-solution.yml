name: ✅ Validate Solution Structure

on:
  push:
    branches: [main]
    paths:
      - 'topics/**'            # LC organized solutions
      - 'Difficulty: **'       # GFG solutions (GFG-to-GitHub format)
      - '[0-9]*/**'            # LC root dumps from LeetSync

jobs:
  validate:
    name: Check Solution Format
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Get Changed Files
        id: changed-files
        run: |
          echo "changed=$(git diff --name-only HEAD~1 HEAD | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: ✅ Validate LeetCode Solutions (topics/)
        run: |
          python3 - <<'EOF'
          import os, sys, re

          changed   = "${{ steps.changed-files.outputs.changed }}".split()
          lc_files  = [
              f for f in changed
              if f.endswith('.java') and 'topics/' in f
          ]

          REQUIRED = ['INTUITION', 'APPROACH', 'COMPLEXITY', 'Time', 'Space']
          warnings = []

          for filepath in lc_files:
              if not os.path.exists(filepath):
                  continue
              content = open(filepath).read()
              for section in REQUIRED:
                  if section not in content:
                      warnings.append(f"⚠️  [LC] {filepath}: Missing section '{section}'")
              if 'MM-DD' in content:
                  warnings.append(f"⚠️  [LC] {filepath}: Date placeholder not filled in")

          if warnings:
              print("LeetCode Validation Warnings:")
              [print(w) for w in warnings]
          else:
              print(f"✅ {len(lc_files)} LC Java file(s) validated.")
          EOF

      - name: ✅ Validate GFG Solutions (Difficulty: */)
        run: |
          python3 - <<'EOF'
          import os, sys, re

          changed   = "${{ steps.changed-files.outputs.changed }}".split()
          # GFG files match: Difficulty: Easy/Problem Name/Solution.java
          gfg_files = [
              f for f in changed
              if f.startswith('Difficulty:') and f.endswith('.java')
          ]

          warnings = []
          for filepath in gfg_files:
              if not os.path.exists(filepath):
                  continue
              content = open(filepath).read()
              # GFG solutions have looser requirements — just check non-empty
              if len(content.strip()) < 50:
                  warnings.append(f"⚠️  [GFG] {filepath}: File seems empty or too short")

          if warnings:
              print("GFG Validation Warnings:")
              [print(w) for w in warnings]
          else:
              print(f"✅ {len(gfg_files)} GFG file(s) validated.")
          EOF

      - name: 📋 Check LC Folder Naming Convention
        run: |
          python3 - <<'EOF'
          import os, re, sys

          errors = []
          topics_dir = 'topics'

          if not os.path.exists(topics_dir):
              print("⚠️  topics/ not found, skipping naming check.")
              sys.exit(0)

          for topic in os.listdir(topics_dir):
              topic_path = os.path.join(topics_dir, topic)
              if not os.path.isdir(topic_path):
                  continue
              for problem in os.listdir(topic_path):
                  prob_path = os.path.join(topic_path, problem)
                  if not os.path.isdir(prob_path) or problem.startswith('.'):
                      continue
                  if not re.match(r'^\d+-[a-z0-9-]+$', problem):
                      errors.append(f"❌ Bad folder name: {prob_path}")
                      errors.append(f"   Expected: {{number}}-{{kebab-case-name}}")

          if errors:
              [print(e) for e in errors]
              sys.exit(1)

          print("✅ All LC folder names are valid.")
          EOF

      - name: 📋 Check GFG Folder Naming Convention
        run: |
          python3 - <<'EOF'
          import os, re, sys

          VALID_DIFFICULTIES = {'Difficulty: Basic', 'Difficulty: Easy',
                                'Difficulty: Medium', 'Difficulty: Hard'}
          warnings = []

          for item in os.listdir('.'):
              if not item.startswith('Difficulty:'):
                  continue
              if item not in VALID_DIFFICULTIES:
                  warnings.append(f"⚠️  Unknown GFG difficulty folder: '{item}'")
                  warnings.append(f"   Expected one of: {sorted(VALID_DIFFICULTIES)}")

          if warnings:
              [print(w) for w in warnings]
          else:
              print("✅ GFG difficulty folders are valid.")
          EOF
