name: 📊 Update README Stats (LC + GFG)

on:
  push:
    branches: [main]
  schedule:
    # Every day at midnight IST (6:30 PM UTC)
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update Progress Stats
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 📊 Scan LeetCode Problems
        id: lc_scan
        continue-on-error: true       # ← GFG still runs even if LC API is down
        run: python scripts/update_readme.py
        env:
          SCAN_MODE: leetcode_only    # future flag for partial runs

      - name: 📊 Full Dual-Platform Update
        # Runs unconditionally — if LC scan failed above, this catches everything
        run: python scripts/update_readme.py

      - name: 💾 Commit & Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          # Stage README + auto-updated problem index
          git add README.md scripts/problem_index.json
          # Only commit when something actually changed
          git diff --staged --quiet || \
            git commit -m "chore(stats): auto-update LC+GFG progress [skip ci]"
          git push
