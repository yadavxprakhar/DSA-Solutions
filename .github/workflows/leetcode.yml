name: Update LeetCode Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install axios

      - name: Update README
        run: |
          node <<EOF
          const fs = require("fs");
const path = require("path");

function getProblems(dir) {
  let problems = [];

  const files = fs.readdirSync(dir);

  for (let file of files) {
    const fullPath = path.join(dir, file);

    if (fs.statSync(fullPath).isDirectory()) {
      problems.push({
        name: file,
        path: fullPath
      });
    }
  }

  return problems;
}

function generateTable(problems) {
  let table = `| Problem | Link |\n|--------|------|\n`;

  problems.forEach(p => {
    table += `| ${p.name} | [View](./${p.name}) |\n`;
  });

  return table;
}

function updateReadme(table) {
  let readme = fs.readFileSync("README.md", "utf-8");

  const newSection = `
<!-- START_TABLE -->
${table}
<!-- END_TABLE -->
`;

  readme = readme.replace(
    /<!-- START_TABLE -->[\s\S]*<!-- END_TABLE -->/,
    newSection
  );

  fs.writeFileSync("README.md", readme);
}

const problems = getProblems(".");
const table = generateTable(problems);
updateReadme(table);
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Auto update LeetCode stats" || echo "No changes"
          git push
